<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WS Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d2e;
      --surface2:  #222538;
      --border:    #2d3148;
      --accent:    #4f46e5;
      --accent-h:  #4338ca;
      --green:     #22c55e;
      --red:       #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --sidebar-w: 200px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── Username overlay ──────────────────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    #overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
      width: 320px;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .modal h2 { font-size: 1.2rem; color: var(--accent); }
    .modal p  { font-size: 0.85rem; color: var(--muted); }

    .modal input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.6rem 0.9rem;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }
    .modal input:focus { border-color: var(--accent); }

    .modal button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .modal button:hover { background: var(--accent-h); }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.25rem;
      display: flex; align-items: center; gap: 0.75rem;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 700; }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--red); flex-shrink: 0;
      transition: background .3s;
    }
    .dot.on { background: var(--green); }
    #conn-status { font-size: 0.8rem; color: var(--muted); }
    #me-badge {
      margin-left: auto;
      font-size: 0.8rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.2rem 0.7rem;
      color: var(--accent);
      font-weight: 600;
    }

    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    aside {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    aside h3 {
      font-size: 0.72rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.9rem 1rem 0.4rem;
    }
    #users-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 0.5rem 1rem;
      display: flex; flex-direction: column; gap: 2px;
    }
    .user-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .user-item .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .user-item.is-me { background: var(--surface2); }
    .user-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-item.is-me .name { color: var(--accent); }

    /* ── Chat area ───────────────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex; flex-direction: column; gap: 0.5rem;
      scroll-behavior: smooth;
    }

    /* System messages */
    .msg-system {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
      padding: 0.15rem 0;
    }

    /* Chat bubbles */
    .msg-row {
      display: flex;
      gap: 0.5rem;
      max-width: 72%;
    }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.other { align-self: flex-start; }

    .msg-row .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #fff;
      flex-shrink: 0; align-self: flex-end;
    }

    .bubble-wrap { display: flex; flex-direction: column; gap: 2px; }
    .mine .bubble-wrap { align-items: flex-end; }
    .other .bubble-wrap { align-items: flex-start; }

    .bubble-meta {
      font-size: 0.7rem; color: var(--muted);
      padding: 0 4px;
    }

    .bubble {
      padding: 0.55rem 0.85rem;
      border-radius: 14px;
      font-size: 0.875rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .mine  .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .other .bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; }

    /* ── Input bar ────────────────────────────────────────────────────────── */
    .input-bar {
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      display: flex; gap: 0.5rem;
      background: var(--surface);
    }
    .input-bar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s;
    }
    .input-bar input:focus { border-color: var(--accent); }
    .input-bar input:disabled { opacity: .4; cursor: not-allowed; }

    .input-bar button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem; font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      flex-shrink: 0;
    }
    .input-bar button:hover:not(:disabled) { background: var(--accent-h); }
    .input-bar button:disabled { opacity: .4; cursor: not-allowed; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- ── Username modal ─────────────────────────────────────────────────── -->
  <div id="overlay">
    <div class="modal">
      <h2>💬 Join the chat</h2>
      <p>Pick a username to start chatting</p>
      <input id="username-input" type="text" placeholder="Your name…" maxlength="24" autocomplete="off" />
      <button id="join-btn">Join</button>
    </div>
  </div>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <div class="dot" id="dot"></div>
    <h1>WS Chat</h1>
    <span id="conn-status">Connecting…</span>
    <span id="me-badge" style="display:none"></span>
  </header>

  <!-- ── Body ───────────────────────────────────────────────────────────── -->
  <div class="body">

    <!-- Sidebar: online users -->
    <aside>
      <h3>Online</h3>
      <div id="users-list"></div>
    </aside>

    <!-- Main: messages + input -->
    <main>
      <div id="log"></div>
      <div class="input-bar">
        <input id="msg-input" type="text" placeholder="Type a message…" disabled autocomplete="off" />
        <button id="send-btn" disabled>Send</button>
      </div>
    </main>

  </div>

  <script>
    // ── DOM refs ─────────────────────────────────────────────────────────
    const overlay      = document.getElementById('overlay');
    const usernameInput = document.getElementById('username-input');
    const joinBtn      = document.getElementById('join-btn');
    const dot          = document.getElementById('dot');
    const connStatus   = document.getElementById('conn-status');
    const meBadge      = document.getElementById('me-badge');
    const log          = document.getElementById('log');
    const msgInput     = document.getElementById('msg-input');
    const sendBtn      = document.getElementById('send-btn');
    const usersList    = document.getElementById('users-list');

    // ── State ─────────────────────────────────────────────────────────────
    let ws         = null;
    let myClientId = null;
    let myUsername = null;
    let pendingJoin = null;   // username to send once WS opens

    // ── Avatar colours (deterministic from clientId) ──────────────────────
    const COLOURS = ['#4f46e5','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6'];
    const avatarColor = (id) => COLOURS[id % COLOURS.length];
    const initials    = (name) => name.slice(0, 2).toUpperCase();

    // ── Join button ───────────────────────────────────────────────────────
    function attemptJoin() {
      const name = usernameInput.value.trim();
      if (!name) { usernameInput.focus(); return; }
      pendingJoin = name;
      overlay.classList.add('hidden');
      connect();
    }
    joinBtn.addEventListener('click', attemptJoin);
    usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptJoin(); });

    // ── WebSocket ─────────────────────────────────────────────────────────
    const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;

    function connect() {
      ws = new WebSocket(wsUrl);

      ws.addEventListener('open', () => {
        setConnected(true);
        // Send join handshake immediately
        ws.send(JSON.stringify({ type: 'join', username: pendingJoin }));
      });

      ws.addEventListener('message', ({ data }) => {
        const msg = JSON.parse(data);
        handleMessage(msg);
      });

      ws.addEventListener('close', () => {
        setConnected(false);
        addSystem('Disconnected. Reconnecting in 3 s…');
        setTimeout(connect, 3000);
      });

      ws.addEventListener('error', () => {
        addSystem('Connection error.');
      });
    }

    // ── Message handler ───────────────────────────────────────────────────
    function handleMessage(msg) {
      switch (msg.type) {
        case 'welcome':
          myClientId = msg.clientId;
          myUsername = msg.username;
          meBadge.textContent = `@${myUsername}`;
          meBadge.style.display = '';
          msgInput.disabled  = false;
          sendBtn.disabled   = false;
          msgInput.focus();
          renderUsers(msg.users);
          // Replay history
          if (msg.history?.length) {
            addSystem(`— Last ${msg.history.length} message(s) —`);
            msg.history.forEach(renderBubble);
          }
          break;

        case 'message':
          renderBubble(msg);
          break;

        case 'user_joined':
          addSystem(msg.message);
          renderUsers(msg.users);
          break;

        case 'user_left':
          addSystem(msg.message);
          renderUsers(msg.users);
          break;

        case 'error':
          addSystem(`⚠️ ${msg.message}`);
          break;
      }
    }

    // ── Render helpers ────────────────────────────────────────────────────
    function renderBubble({ clientId, username, text, timestamp }) {
      const isMe = clientId === myClientId;
      const row  = document.createElement('div');
      row.className = `msg-row ${isMe ? 'mine' : 'other'}`;

      const av = document.createElement('div');
      av.className = 'avatar';
      av.style.background = avatarColor(clientId);
      av.textContent = initials(username);

      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap';

      const meta = document.createElement('div');
      meta.className = 'bubble-meta';
      meta.textContent = `${isMe ? 'You' : username} · ${new Date(timestamp).toLocaleTimeString()}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;   // already sanitized server-side

      wrap.append(meta, bubble);
      row.append(isMe ? wrap : av, isMe ? av : wrap);
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;
    }

    function addSystem(message) {
      const el = document.createElement('div');
      el.className = 'msg-system';
      el.textContent = message;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
    }

    function renderUsers(users = []) {
      usersList.innerHTML = '';
      users.forEach(({ clientId, username }) => {
        const item = document.createElement('div');
        item.className = `user-item${clientId === myClientId ? ' is-me' : ''}`;

        const av = document.createElement('div');
        av.className = 'avatar';
        av.style.background = avatarColor(clientId);
        av.textContent = initials(username);

        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = clientId === myClientId ? `${username} (you)` : username;

        item.append(av, name);
        usersList.appendChild(item);
      });
    }

    // ── Send message ──────────────────────────────────────────────────────
    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'message', text }));
      msgInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    // ── Connection state helpers ──────────────────────────────────────────
    function setConnected(on) {
      dot.classList.toggle('on', on);
      connStatus.textContent = on ? 'Connected' : 'Reconnecting…';
    }
  </script>
</body>
</html>
