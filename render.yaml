# render.yaml — Infrastructure-as-code for Render
# Docs: https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: ws-broadcast-demo
    runtime: node
    plan: free          # free tier is fine for testing
    buildCommand: npm install --registry https://registry.npmjs.org
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
